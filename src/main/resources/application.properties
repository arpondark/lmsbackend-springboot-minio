spring.application.name=lmsbackend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/lms
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=arpon007

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# File upload configuration
app.upload.root=uploads
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# JWT configuration
jwt.secret=change-this-secret-key-to-a-very-long-random-string-at-least-32-bytes
jwt.expiration-ms=86400000
jwt.issuer=lmsbackend

# Default admin seed (for first boot)
app.seed.default-admin.enabled=true
app.seed.default-admin.username=admin
app.seed.default-admin.password=admin
app.seed.default-admin.email=admin@lms.local
app.seed.default-admin.phone-number=0000000000
app.seed.default-admin.first-name=System
app.seed.default-admin.last-name=Admin

